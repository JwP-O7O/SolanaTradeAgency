<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SolanaTradeAgency Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto p-8">
        <h1 class="text-3xl font-bold text-blue-400 mb-8">SolanaTradeAgency Dashboard</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-gray-800 p-6 rounded-lg shadow-xl border border-gray-700">
                <h2 class="text-gray-400 font-semibold mb-2 uppercase text-xs tracking-wider">Portfolio Balance</h2>
                <p id="balance" class="text-3xl font-mono font-bold text-green-400">0.00 SOL</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-lg shadow-xl border border-gray-700">
                <h2 class="text-gray-400 font-semibold mb-2 uppercase text-xs tracking-wider">Live Status</h2>
                <div class="flex items-center space-x-2">
                    <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                    <p class="text-xl font-semibold">Agency Running</p>
                </div>
            </div>
        </div>
    </div>
    <script>
        const socket = io();
        socket.on('init', data => {
            if(data.portfolio) document.getElementById('balance').innerText = data.portfolio.balance.toFixed(3) + ' SOL';
        });
    </script>
</body>
</html>
